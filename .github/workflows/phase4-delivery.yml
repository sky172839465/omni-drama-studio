name: "Phase 4: Delivery"

on:
  repository_dispatch:
    types: [finalize-production]

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
      - name: Install dependencies
        run: npm install
      - name: Final Assembly
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          STORY_ID=${{ github.event.client_payload.storyId }}
          node -e "import { runEditor } from './src/agents/editor.js'; runEditor('$STORY_ID', 'final').then(res => console.log(JSON.stringify(res)))" > final_res.json

      - name: Notify Telegram
        run: |
          FINAL_URL=$(jq -r .finalVideoKey < final_res.json)
          MESSAGE="🎬 *製作完成！*%0A故事：${{ github.event.client_payload.storyId }}%0A觀看連結：${FINAL_URL}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=${MESSAGE}&parse_mode=Markdown"
