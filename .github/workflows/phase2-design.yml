name: "Phase 2: Character Design"

on:
  pull_request:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  design:
    if: startsWith(github.head_ref, 'story/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Install
        run: npm install
      - name: Generate Concepts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          STORY_ID=$(echo "${{ github.head_ref }}" | sed 's/story\///')
          node src/scripts/run-designer.js "$STORY_ID" > design_output.json

      - name: Commit Design JSON
        run: |
          STORY_ID=$(echo "${{ github.head_ref }}" | sed 's/story\///')
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "drama/$STORY_ID/design.json"
          git commit -m "chore: 儲存角色設計與視覺概念 (story $STORY_ID)"
          git push

      - name: Post Comment
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          node -e "
            const fs = require('fs');
            const design = JSON.parse(fs.readFileSync('design_output.json', 'utf8'));
            let body = '## 視覺概念提案\n\n';
            design.concepts.forEach(c => {
              body += \`### 概念 \${c.id}\n\${c.description}\n**外觀特徵:** \${c.appearance_seeds.join(', ')}\n\n\`;
            });
            body += '\n**請從底下來選擇回覆並繼續流程。**';
            body += '\n - `omni-drama-studio choose A`';
            body += '\n - `omni-drama-studio choose B`';
            body += '\n - `omni-drama-studio choose C`';
            fs.writeFileSync('comment_body.md', body);
          "
          gh issue comment ${{ github.event.issue.number || github.event.pull_request.number }} --body-file comment_body.md
