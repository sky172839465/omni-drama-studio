name: "Phase 2: Character Design"

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  design:
    if: startsWith(github.head_ref, 'story/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Install
        run: npm install
      - name: Generate Concepts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          STORY_ID=$(echo "${{ github.head_ref }}" | sed 's/story\///')
          node src/scripts/run-designer.js "$STORY_ID" > design_output.json

      - name: Post Comment
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          node -e "
            const fs = require('fs');
            const design = JSON.parse(fs.readFileSync('design_output.json', 'utf8'));
            let body = '## Visual Concepts Proposed\n\n';
            design.concepts.forEach(c => {
              body += \`### Concept \${c.id}\n\${c.description}\n**Traits:** \${c.appearance_seeds.join(', ')}\n\n\`;
            });
            body += '\n**Please reply with \`@bot choose [A/B/C]\` to proceed.**';
            fs.writeFileSync('comment_body.md', body);
          "
          gh issue comment ${{ github.event.issue.number || github.event.pull_request.number }} --body-file comment_body.md
