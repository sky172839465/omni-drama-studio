name: "Phase 2: Character Design"

on:
  pull_request:
    types: [opened]

jobs:
  design:
    if: startsWith(github.head_ref, 'story/')
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install
        run: npm install
      - name: Generate Concepts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          STORY_ID=$(echo "${{ github.head_ref }}" | sed 's/story\///')
          node src/scripts/run-designer.js "$STORY_ID" > design_output.json

      - name: Post Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const fs = require('fs');
            const design = JSON.parse(fs.readFileSync('design_output.json', 'utf8'));
            let body = "## Visual Concepts Proposed\n\n";
            design.concepts.forEach(c => {
              body += `### Concept ${c.id}\n${c.description}\n**Traits:** ${c.appearance_seeds.join(', ')}\n\n`;
            });
            body += "\n**Please reply with `@bot choose [A/B/C]` to proceed.**";

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
