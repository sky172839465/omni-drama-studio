name: "Phase 1: Screenwriter"

on:
  workflow_dispatch:
    inputs:
      scp_url:
        description: "SCP Article URL (e.g., http://scp-zh-tr.wikidot.com/scp-001)"
        required: true
      maximum_video_duration:
        description: "Maximum video duration in minutes"
        required: false
        default: '5'

jobs:
  screenwrite:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          sudo npm install -g agent-browser
          agent-browser install

      - name: Run Screenwriter Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          SCP_URL: ${{ github.event.inputs.scp_url }}
          MAXIMUM_VIDEO_DURATION: ${{ github.event.inputs.maximum_video_duration }}
        run: |
          node src/scripts/run-screenwriter.js "$SCP_URL" "$MAXIMUM_VIDEO_DURATION" > output.json
          STORY_ID=$(jq -r .storyId < output.json)
          echo "STORY_ID=$STORY_ID" >> $GITHUB_ENV
          mv output.json "drama/$STORY_ID/output.json"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b "story/${{ env.STORY_ID }}"
          git add .
          git commit -m "chore: 初始化故事 ${{ env.STORY_ID }}"
          git push -u origin "story/${{ env.STORY_ID }}"
          gh pr create \
            --title "Production: ${{ env.STORY_ID }}" \
            --body "已為 ${{ github.event.inputs.scp_url }} 啟動新的故事製作。

            請檢閱位於 \`drama/${{ env.STORY_ID }}\` 目錄中的 \`script.json\` 與 \`checklist.md\`。

            下一步: 角色設計師將在下方發布視覺概念提案。" \
            --head "story/${{ env.STORY_ID }}" \
            --base main
