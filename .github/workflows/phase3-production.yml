name: "Phase 3: Production Loop"

on:
  repository_dispatch:
    types: [continue-production]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  handle-selection:
    if: startsWith(github.event.comment.body, 'omni-drama-studio choose')
    runs-on: ubuntu-latest
    steps:
      - name: Add reaction
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: gh api -X POST /repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content='eyes'
      - name: Get Story ID
        run: |
          STORY_ID=$(printf "%s" "${{ github.event.issue.title }}" | sed 's/^Production: //')
          echo "STORY_ID=$STORY_ID" >> "$GITHUB_ENV"
      - uses: actions/checkout@v5
        with:
          ref: story/${{ env.STORY_ID }}
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
      - name: Parse Selection
        run: |
          CHOICE=$(echo "${{ github.event.comment.body }}" | sed -E 's/^omni-drama-studio choose ([A-Z])$/\1/')
          echo "CHOICE=$CHOICE" >> $GITHUB_ENV

      - name: Save Config
        run: |
          node -e "
            import fs from 'fs';
            const storyId = process.env.STORY_ID;
            const choice = process.env.CHOICE;
            const design = JSON.parse(fs.readFileSync('drama/' + storyId + '/design.json', 'utf8'));
            const selected = design.concepts.find(c => c.id === choice);
            const script = JSON.parse(fs.readFileSync('drama/' + storyId + '/script.json', 'utf8'));
            const config = { ...selected, global_mood: script.global_mood };
            fs.writeFileSync('drama/' + storyId + '/config.json', JSON.stringify(config, null, 2));
          "
      - name: Commit Config
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "chore: 設定視覺配置 (story ${{ env.STORY_ID }})"
          git push

      - name: Trigger Production
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/dispatches \
            -f event_type="continue-production" \
            -F client_payload='{"storyId":"'"$STORY_ID"'"}'

  director-loop:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: story/${{ github.event.client_payload.storyId }}
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Install
        run: npm install
      - name: Director Action
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          STORY_ID=${{ github.event.client_payload.storyId }}
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase
          node src/index.js "$STORY_ID" > loop_res.json

      - name: Commit Progress
        run: |
          git add .
          git commit -m "docs: 更新製作進度檢查清單" || exit 0
          git push

      - name: Recursive Trigger
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # The loop script (index.js) doesn't output JSON yet, but we'll fix it or just check checklist
          # For now, let's assume if it finished successfully, we check if more work is needed
          STORY_ID=${{ github.event.client_payload.storyId }}
          if grep -q "- \[ \]" drama/$STORY_ID/checklist.md; then
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              /repos/${{ github.repository }}/dispatches \
              -f event_type="continue-production" \
              -F client_payload="{\"storyId\":\"$STORY_ID\"}"
          else
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              /repos/${{ github.repository }}/dispatches \
              -f event_type="finalize-production" \
              -F client_payload="{\"storyId\":\"$STORY_ID\"}"
          fi
